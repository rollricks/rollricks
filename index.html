<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RollRicks - 10 Second Challenge</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--neon:#00ff41;--neon-dim:#00cc33;--neon-glow:0 0 10px #00ff41,0 0 20px #00ff41,0 0 40px #00ff41;--bg:#0a0a0a;--card:#111;--danger:#ff0040;--gold:#ffd700;--orange:#ff6600}
  html,body{height:100%;overflow:hidden;font-family:'Courier New',monospace;background:var(--bg);color:var(--neon);touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}

  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.03) 2px,rgba(0,255,65,.03) 4px);pointer-events:none;z-index:999}

  .screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100vw;padding:20px;text-align:center;position:absolute;inset:0}
  .screen.active{display:flex}

  .logo{font-size:clamp(2.5rem,8vw,4.5rem);font-weight:900;letter-spacing:4px;text-shadow:var(--neon-glow);margin-bottom:8px;animation:flicker 3s infinite}
  .tagline{font-size:clamp(.9rem,3vw,1.2rem);color:var(--neon-dim);margin-bottom:40px;opacity:.8}
  .subtitle{font-size:clamp(.75rem,2.5vw,1rem);color:#888;margin-bottom:30px;line-height:1.6}

  .btn{border:2px solid var(--neon);background:transparent;color:var(--neon);font-family:inherit;font-size:clamp(1.2rem,4vw,1.8rem);font-weight:700;padding:18px 60px;border-radius:8px;cursor:pointer;text-transform:uppercase;letter-spacing:3px;transition:all .2s;position:relative;overflow:hidden}
  .btn:active{transform:scale(.95)}
  .btn::before{content:'';position:absolute;inset:0;background:var(--neon);opacity:0;transition:opacity .2s}
  .btn:hover::before,.btn:active::before{opacity:.1}
  .btn.big{padding:24px 80px;font-size:clamp(1.5rem,5vw,2.2rem);border-width:3px;animation:pulse-border 2s infinite}
  .btn.stop{border-color:var(--danger);color:var(--danger);animation:pulse-stop 0.5s infinite}
  .btn.stop::before{background:var(--danger)}
  .btn:disabled{opacity:.3;pointer-events:none}

  /* Countdown overlay */
  .countdown-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column}
  .countdown-overlay.show{display:flex}
  .countdown-num{font-size:clamp(5rem,20vw,10rem);font-weight:900;text-shadow:var(--neon-glow);animation:zoom-in .4s ease-out}
  .countdown-go{font-size:clamp(4rem,18vw,8rem);font-weight:900;color:var(--gold);text-shadow:0 0 20px var(--gold),0 0 40px var(--gold);animation:zoom-in .3s ease-out}

  /* Game screen - timer hidden, only pulsing dot */
  .timer-wrap{margin:30px 0}
  .timer-hidden{font-size:clamp(3.5rem,15vw,7rem);font-weight:900;letter-spacing:2px;text-shadow:var(--neon-glow);font-variant-numeric:tabular-nums;min-width:280px}
  .timer-hidden .dots{animation:blink-dots 1s infinite}
  .pulse-ring{width:120px;height:120px;border-radius:50%;border:4px solid var(--neon);margin:20px auto;position:relative;animation:pulse-ring 1s ease-in-out infinite}
  .pulse-ring.hot{border-color:var(--gold);animation:pulse-ring-hot .5s ease-in-out infinite}
  .pulse-ring.danger{border-color:var(--danger);animation:pulse-ring-danger .3s ease-in-out infinite}
  .pulse-ring::after{content:'';position:absolute;inset:15px;border-radius:50%;background:var(--neon);opacity:.3;animation:heartbeat 1s ease-in-out infinite}
  .pulse-ring.hot::after{background:var(--gold);opacity:.5}
  .pulse-ring.danger::after{background:var(--danger);opacity:.5}
  .inner-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:var(--neon)}
  .pulse-ring.hot .inner-text{color:var(--gold)}
  .pulse-ring.danger .inner-text{color:var(--danger)}

  .hint{color:#555;font-size:.8rem;margin-top:15px}
  .elapsed-hint{color:#444;font-size:.7rem;margin-top:8px;font-style:italic}

  /* Result */
  .result-icon{font-size:clamp(3rem,12vw,5rem);margin-bottom:15px}
  .result-msg{font-size:clamp(1.3rem,5vw,2rem);font-weight:900;margin-bottom:10px;line-height:1.3}
  .result-discount{font-size:clamp(2rem,8vw,3.5rem);font-weight:900;margin:15px 0;padding:15px 30px;border:3px solid;border-radius:12px;animation:pulse-border 1.5s infinite}
  .result-discount.gold{color:var(--gold);border-color:var(--gold);text-shadow:0 0 10px var(--gold),0 0 20px var(--gold)}
  .result-discount.orange{color:var(--orange);border-color:var(--orange);text-shadow:0 0 10px var(--orange)}
  .result-discount.neon{color:var(--neon);border-color:var(--neon);text-shadow:var(--neon-glow)}
  .result-discount.none{display:none}
  .result-time{font-size:clamp(1rem,3vw,1.3rem);color:#888;margin-bottom:20px}
  .result-claim{font-size:clamp(.8rem,2.5vw,1rem);color:#aaa;background:#1a1a1a;padding:12px 20px;border-radius:8px;margin:10px 0;border:1px solid #333;line-height:1.5}
  .result-claim.hidden{display:none}
  .qr-wrap{margin:10px 0;padding:10px;background:#fff;border-radius:12px;display:inline-block}
  .qr-wrap.hidden{display:none}
  .qr-wrap canvas{display:block}
  .token-code{font-family:'Courier New',monospace;font-size:.7rem;color:#555;margin-top:8px;letter-spacing:1px}
  .cooldown-msg{color:var(--danger);font-size:clamp(.85rem,2.5vw,1rem);margin-top:10px;min-height:24px}

  /* Almost overlay */
  .almost-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column}
  .almost-overlay.show{display:flex}
  .almost-text{font-size:clamp(1.5rem,6vw,2.5rem);font-weight:900;animation:shake .4s ease-in-out}
  .almost-sub{font-size:clamp(.9rem,3vw,1.2rem);color:#888;margin-top:10px}

  /* No-discount good message */
  .good-msg{font-size:clamp(1rem,3.5vw,1.4rem);color:#888;margin:15px 0;line-height:1.6;max-width:350px}

  .confetti-container{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
  .confetti{position:absolute;width:10px;height:10px;top:-10px;animation:confetti-fall 3s ease-in forwards}

  .screen-shake{animation:screen-shake .3s ease-out}

  @keyframes flicker{0%,95%,100%{opacity:1}96%,98%{opacity:.6}97%{opacity:.3}}
  @keyframes pulse-border{0%,100%{box-shadow:0 0 5px currentColor}50%{box-shadow:0 0 20px currentColor,0 0 40px currentColor}}
  @keyframes pulse-stop{0%,100%{box-shadow:0 0 5px var(--danger)}50%{box-shadow:0 0 25px var(--danger),0 0 50px var(--danger)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-15px)}40%{transform:translateX(15px)}60%{transform:translateX(-10px)}80%{transform:translateX(10px)}}
  @keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
  @keyframes slide-up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
  @keyframes zoom-in{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
  @keyframes blink-dots{0%,100%{opacity:1}50%{opacity:.2}}
  @keyframes pulse-ring{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.7}}
  @keyframes pulse-ring-hot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.12);opacity:.6}}
  @keyframes pulse-ring-danger{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.5}}
  @keyframes heartbeat{0%,100%{transform:scale(.8)}50%{transform:scale(1)}}
  @keyframes screen-shake{0%,100%{transform:translate(0)}10%{transform:translate(-5px,3px)}30%{transform:translate(5px,-3px)}50%{transform:translate(-3px,5px)}70%{transform:translate(3px,-5px)}90%{transform:translate(-2px,2px)}}

  .anim-slide{animation:slide-up .5s ease-out both}
  .anim-zoom{animation:zoom-in .4s ease-out both}
  .d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}.d6{animation-delay:.6s}.d7{animation-delay:.7s}

  /* Scroll for result screen on small devices */
  #result{overflow-y:auto;justify-content:flex-start;padding-top:40px;padding-bottom:40px}
</style>
</head>
<body>

<!-- QR Code library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>

<!-- COUNTDOWN OVERLAY -->
<div class="countdown-overlay" id="countdownOverlay">
  <div id="countdownContent"></div>
</div>

<!-- INTRO SCREEN -->
<div id="intro" class="screen active">
  <div class="logo">ROLLRICKS</div>
  <div class="tagline">// 10 SECOND CHALLENGE //</div>
  <div class="subtitle">
    The timer is <strong style="color:var(--danger)">hidden</strong>. Trust your gut.<br>
    Stop at exactly <strong style="color:var(--neon)">10.00s</strong> to win <strong style="color:var(--gold)">50% OFF!</strong>
  </div>
  <button class="btn big" id="startBtn" onclick="initGame()">START</button>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">
  <div class="hint" id="hint" style="margin-bottom:10px">Feel the rhythm... stop at 10 seconds!</div>
  <div class="timer-wrap">
    <div class="pulse-ring" id="pulseRing">
      <div class="inner-text" id="pulseText">GO</div>
    </div>
  </div>
  <div class="elapsed-hint" id="elapsedHint">Timer running...</div>
  <div style="margin-top:30px">
    <button class="btn stop big" id="stopBtn" onclick="stopGame()">STOP</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result" class="screen">
  <div class="result-icon anim-zoom" id="resultIcon"></div>
  <div class="result-msg anim-slide d1" id="resultMsg"></div>
  <div class="result-time anim-slide d2" id="resultTime"></div>
  <div class="result-discount anim-zoom d3" id="resultDiscount"></div>
  <div class="good-msg anim-slide d3" id="goodMsg" style="display:none"></div>
  <div class="qr-wrap hidden anim-zoom d4" id="qrWrap"><canvas id="qrCanvas"></canvas></div>
  <div class="token-code anim-slide d5" id="tokenCode"></div>
  <div class="result-claim anim-slide d5 hidden" id="resultClaim"></div>
  <button class="btn anim-slide d6" id="retryBtn" onclick="retry()">PLAY AGAIN</button>
  <div class="cooldown-msg anim-slide d7" id="cooldownMsg"></div>
</div>

<!-- ALMOST OVERLAY -->
<div class="almost-overlay" id="almostOverlay">
  <div class="almost-text" id="almostText"></div>
  <div class="almost-sub">So close...</div>
</div>

<!-- CONFETTI -->
<div class="confetti-container" id="confetti"></div>

<script>
// ── ANTI-CHEAT ──
// Freeze time references at load
const _perfNow = performance.now.bind(performance);
const _dateNow = Date.now.bind(Date);
const _raf = requestAnimationFrame.bind(window);
const _craf = cancelAnimationFrame.bind(window);

// Detect DevTools
let devtoolsOpen = false;
const dtCheck = new Image();
Object.defineProperty(dtCheck, 'id', { get: function() { devtoolsOpen = true; }});
setInterval(function() { devtoolsOpen = false; console.log('%c', dtCheck); }, 1000);

// Block common console cheats
Object.defineProperty(window, 'startTime', { get:()=>0, set:()=>{}, configurable:false });
Object.defineProperty(window, 'elapsed', { get:()=>0, set:()=>{}, configurable:false });

// ── STATE (closure-protected) ──
const G = (function(){
  let _start = 0, _elapsed = 0, _running = false, _rafId = null, _lastPlay = 0;
  const COOLDOWN = 60000;
  return {
    get start(){ return _start }, set start(v){ _start = v },
    get elapsed(){ return _elapsed }, set elapsed(v){ _elapsed = v },
    get running(){ return _running }, set running(v){ _running = v },
    get rafId(){ return _rafId }, set rafId(v){ _rafId = v },
    get lastPlay(){ return _lastPlay }, set lastPlay(v){ _lastPlay = v },
    COOLDOWN
  };
})();

// ── TOKEN GENERATOR (anti-forge) ──
function genToken(time, discount) {
  const ts = _dateNow();
  const raw = `RR-${time.toFixed(2)}-${discount}-${ts}`;
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    hash = ((hash << 5) - hash + raw.charCodeAt(i)) | 0;
  }
  const hex = Math.abs(hash).toString(16).toUpperCase().padStart(8, '0');
  return { code: `RR-${hex}-${discount}`, ts, raw };
}

// ── AUDIO ──
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, type='square', vol=0.15) {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol; g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g).connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e){}
}
function vibrate(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch(e){} }

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── COUNTDOWN then START ──
function initGame() {
  const now = _dateNow();
  if (G.lastPlay && (now - G.lastPlay) < G.COOLDOWN) {
    const left = Math.ceil((G.COOLDOWN - (now - G.lastPlay)) / 1000);
    alert(`Chill! Try again in ${left}s`);
    return;
  }
  if (devtoolsOpen) {
    alert('Close DevTools to play!');
    return;
  }

  const overlay = document.getElementById('countdownOverlay');
  const content = document.getElementById('countdownContent');
  overlay.classList.add('show');

  let count = 3;
  content.innerHTML = `<div class="countdown-num">${count}</div>`;
  beep(400, 0.1, 'sine');
  vibrate(50);

  const iv = setInterval(() => {
    count--;
    if (count > 0) {
      content.innerHTML = `<div class="countdown-num">${count}</div>`;
      beep(400, 0.1, 'sine');
      vibrate(50);
    } else {
      clearInterval(iv);
      content.innerHTML = `<div class="countdown-go">GO!</div>`;
      beep(800, 0.2, 'sine', 0.2);
      vibrate(100);
      // Random micro-delay (50-300ms) so you can't script exact timing
      const rDelay = 50 + Math.random() * 250;
      setTimeout(() => {
        overlay.classList.remove('show');
        startGame();
      }, rDelay);
    }
  }, 800);
}

function startGame() {
  showScreen('game');

  const ring = document.getElementById('pulseRing');
  const pulseText = document.getElementById('pulseText');
  const hintEl = document.getElementById('hint');
  const elHint = document.getElementById('elapsedHint');

  ring.className = 'pulse-ring';
  pulseText.textContent = 'GO';
  hintEl.textContent = 'Feel the rhythm... stop at 10 seconds!';
  elHint.textContent = 'Timer running...';

  G.start = _perfNow();
  G.running = true;
  G.elapsed = 0;

  let phase = 0; // 0=early, 1=hot zone, 2=danger

  function tick() {
    if (!G.running) return;
    G.elapsed = (_perfNow() - G.start) / 1000;

    // Vague elapsed hints (no exact numbers!)
    if (G.elapsed < 5) {
      elHint.textContent = 'Keep going...';
    } else if (G.elapsed < 8) {
      elHint.textContent = 'Getting there...';
    } else if (G.elapsed < 9) {
      elHint.textContent = 'Almost...';
    } else if (G.elapsed < 9.5) {
      elHint.textContent = 'Get ready...!';
    } else if (G.elapsed < 10.5) {
      elHint.textContent = 'NOW!';
    } else if (G.elapsed < 12) {
      elHint.textContent = 'You might be late...';
    } else {
      elHint.textContent = 'Way too long!';
    }

    // Phase transitions with effects
    if (G.elapsed >= 8.5 && G.elapsed <= 11 && phase < 1) {
      phase = 1;
      ring.className = 'pulse-ring hot';
      pulseText.textContent = '!';
      hintEl.textContent = 'NOW! Trust your instinct!';
      beep(600, 0.05, 'sine', 0.08);
    } else if (G.elapsed > 11 && phase < 2) {
      phase = 2;
      ring.className = 'pulse-ring danger';
      pulseText.textContent = '...';
      hintEl.textContent = 'Too far! Stop!';
    }

    // Auto-stop at 20s
    if (G.elapsed >= 20) { stopGame(); return; }

    G.rafId = _raf(tick);
  }

  G.rafId = _raf(tick);
}

function stopGame() {
  if (!G.running) return;
  G.running = false;
  _craf(G.rafId);
  G.lastPlay = _dateNow();

  if (devtoolsOpen) {
    alert('Nice try! Close DevTools.');
    showScreen('intro');
    return;
  }

  const t = G.elapsed;
  const shown = parseFloat(t.toFixed(2));
  const diff = Math.abs(t - 10);

  vibrate(100);
  beep(600, 0.2, 'sine');

  // Screen shake on stop
  document.body.classList.add('screen-shake');
  setTimeout(() => document.body.classList.remove('screen-shake'), 300);

  // ── TIER LOGIC ──
  // Exactly 10.00 (displayed) → 50% off
  // 9.99 or 10.01 (displayed) → 20% off
  // 9.00–10.07 (displayed, rest) → 5% off
  // Outside 9.00–10.07 → no discount, good message

  let tier, discount;
  if (shown === 10.00) {
    tier = 'gold'; discount = 50;
  } else if (shown === 9.99 || shown === 10.01) {
    tier = 'silver'; discount = 20;
  } else if (shown >= 9.00 && shown <= 10.07) {
    tier = 'bronze'; discount = 5;
  } else {
    tier = 'none'; discount = 0;
  }

  // Dramatic pause for near-misses
  if (tier === 'silver' || (tier === 'bronze' && diff < 0.5)) {
    showAlmostWin(t, tier, discount, shown);
  } else {
    showResult(t, tier, discount, shown);
  }
}

function showAlmostWin(time, tier, discount, shown) {
  const overlay = document.getElementById('almostOverlay');
  const text = document.getElementById('almostText');

  if (tier === 'silver') {
    text.textContent = 'ALMOST PERFECT!';
    text.style.color = 'var(--gold)';
  } else {
    text.textContent = 'SO CLOSE!';
    text.style.color = 'var(--orange)';
  }

  overlay.classList.add('show');
  beep(400, 0.1); setTimeout(() => beep(600, 0.1), 150); setTimeout(() => beep(800, 0.15), 300);
  vibrate([50, 50, 50, 50, 100]);

  setTimeout(() => {
    overlay.classList.remove('show');
    showResult(time, tier, discount, shown);
  }, 1500);
}

function showResult(time, tier, discount, shown) {
  const icon = document.getElementById('resultIcon');
  const msg = document.getElementById('resultMsg');
  const timeEl = document.getElementById('resultTime');
  const discountEl = document.getElementById('resultDiscount');
  const goodMsg = document.getElementById('goodMsg');
  const claim = document.getElementById('resultClaim');
  const qrWrap = document.getElementById('qrWrap');
  const tokenEl = document.getElementById('tokenCode');
  const retryBtn = document.getElementById('retryBtn');
  const cooldownMsg = document.getElementById('cooldownMsg');

  // Time display
  const diff = Math.abs(time - 10);
  let timeDesc;
  if (diff <= 0.005) timeDesc = 'PERFECT!';
  else if (time < 10) timeDesc = (10 - time).toFixed(2) + 's early';
  else timeDesc = (time - 10).toFixed(2) + 's late';
  timeEl.textContent = `Your time: ${shown.toFixed(2)}s (${timeDesc})`;

  // Reset visibility
  discountEl.style.display = '';
  goodMsg.style.display = 'none';
  qrWrap.classList.add('hidden');
  claim.classList.add('hidden');
  tokenEl.textContent = '';

  const goodMessages = [
    "You've got great vibes! Come grab a RollRick anyway!",
    "Not this time, but your taste in food is still perfect!",
    "The real prize? A delicious RollRick waiting for you!",
    "Almost a legend! Come back and try again!",
    "Your timing needs work, but your hunger is right on time!"
  ];

  if (tier === 'gold') {
    icon.textContent = '\uD83C\uDF89';
    msg.textContent = 'LEGENDARY! You nailed it!';
    msg.style.color = 'var(--gold)';
    discountEl.textContent = '50% OFF!';
    discountEl.className = 'result-discount anim-zoom d3 gold';
    spawnConfetti();
    beep(523, 0.15, 'sine'); setTimeout(() => beep(659, 0.15, 'sine'), 150); setTimeout(() => beep(784, 0.3, 'sine'), 300);
    vibrate([100, 50, 100, 50, 200]);
  } else if (tier === 'silver') {
    icon.textContent = '\uD83D\uDD25';
    msg.textContent = 'So close to perfection!';
    msg.style.color = 'var(--orange)';
    discountEl.textContent = '20% OFF!';
    discountEl.className = 'result-discount anim-zoom d3 orange';
    beep(523, 0.15, 'sine'); setTimeout(() => beep(659, 0.2, 'sine'), 200);
    vibrate([100, 50, 100]);
  } else if (tier === 'bronze') {
    icon.textContent = '\uD83D\uDC4D';
    msg.textContent = 'Nice effort!';
    msg.style.color = 'var(--neon)';
    discountEl.textContent = '5% OFF!';
    discountEl.className = 'result-discount anim-zoom d3 neon';
    beep(440, 0.2, 'sine');
    vibrate(80);
  } else {
    // No discount — show a good message
    icon.textContent = '\uD83D\uDE04';
    msg.textContent = 'Better luck next time!';
    msg.style.color = '#888';
    discountEl.style.display = 'none';
    goodMsg.style.display = 'block';
    goodMsg.textContent = goodMessages[Math.floor(Math.random() * goodMessages.length)];
    beep(300, 0.2, 'sine');
    vibrate(50);
  }

  // QR Code + Token for discount tiers only
  if (discount > 0) {
    const token = genToken(time, discount);
    const qrData = JSON.stringify({
      brand: 'RollRicks',
      discount: discount + '%',
      time: shown.toFixed(2),
      code: token.code,
      ts: token.ts,
      expires: token.ts + 600000
    });

    qrWrap.classList.remove('hidden');
    try {
      QRCode.toCanvas(document.getElementById('qrCanvas'), qrData, {
        width: 180, margin: 1,
        color: { dark: '#0a0a0a', light: '#ffffff' }
      });
    } catch(e) {
      // QR lib might not load, show code only
      qrWrap.classList.add('hidden');
    }

    tokenEl.textContent = token.code;

    const now = new Date();
    const ts = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    claim.classList.remove('hidden');
    claim.innerHTML = `Show this QR code at <strong style="color:var(--neon)">RollRicks</strong> counter!<br><span style="color:#666;font-size:.8em">Valid for 10 minutes &middot; ${ts}</span>`;
  }

  // Cooldown
  retryBtn.disabled = true;
  let cd = 60;
  cooldownMsg.textContent = `Play again in ${cd}s`;
  const cdInterval = setInterval(() => {
    cd--;
    if (cd <= 0) {
      clearInterval(cdInterval);
      retryBtn.disabled = false;
      cooldownMsg.textContent = '';
    } else {
      cooldownMsg.textContent = `Play again in ${cd}s`;
    }
  }, 1000);

  showScreen('result');
}

function retry() {
  document.getElementById('confetti').innerHTML = '';
  showScreen('intro');
}

function spawnConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  const colors = ['#00ff41','#ffd700','#ff0040','#00bfff','#ff6600','#ff00ff'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    container.appendChild(el);
  }
}

// Block double-tap zoom
document.addEventListener('dblclick', e => e.preventDefault());

// Block right-click
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
